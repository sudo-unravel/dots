source = ~/.config/hypr/themes/gruvbox-material.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=HDMI-A-2, 1920x1200, 0x0, 1, mirror, DP-2
monitor=DP-1, 2560x1440@165, 0x0, 1, bitdepth, 10, vrr, 1
monitor=DP-2, 1920x1200@60, 2560x120, 1

xwayland {
  force_zero_scaling = true
}

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$browser = floorp
$menu = rofi -show drun
# $menu = walker

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = hypridle
# exec-once = swww-daemon & waybar & swaync
exec-once = qs -c noctalia-shell
exec-once = systemctl --user start plasma-polkit-agent
exec-once = solaar -w hide & nm-applet
exec-once = easyeffects --gapplication-service
exec-once = wl-paste --watch cliphist store
# exec-once = systemctl --user start elephant.service
# exec-once = walker --gapplication-service

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
# env = QT_STYLE_OVERRIDE,kvantum
env = WLR_NO_HARDWARE_CURSORS, 1
env = XDG_MENU_PREFIX, arch-

# cursor {
#     no_hardware_cursors = true
# }

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 8
    gaps_out = 8

    border_size = 3
    col.active_border = $yellow
    col.inactive_border = $bg_med
    resize_on_border = true

    no_focus_fallback = true
    allow_tearing = true 

    layout = dwindle
}

dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = true
    precise_mouse_move = true
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = $bg_dim
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
# animations {
#     enabled = true
#
#     # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
#
#     bezier = overshoot, 0.05, 0.9, 0.1, 1.05
#
#     animation = windows, 1, 4, default, slide
#     animation = windowsOut, 1, 4, default, slide
#     animation = border, 1, 4, default
#     animation = borderangle, 1, 4, default
#     animation = fade, 1, 4, default
#     animation = workspaces, 1, 4, default, slidefade 40%
# }
animations {
    enabled = true
    # Curves
    bezier = expressiveFastSpatial, 0.42, 1.67, 0.21, 0.90
    bezier = expressiveSlowSpatial, 0.39, 1.29, 0.35, 0.98
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08
    bezier = stall, 1, -0.1, 0.7, 0.85
    # Configs
    # windows
    animation = windowsIn, 1, 3, emphasizedDecel, popin 80%
    animation = fadeIn, 1, 3, emphasizedDecel
    animation = windowsOut, 1, 2, emphasizedDecel, popin 90%
    animation = fadeOut, 1, 2, emphasizedDecel
    animation = windowsMove, 1, 3, emphasizedDecel, slide
    animation = border, 1, 10, emphasizedDecel

    # layers
    animation = layersIn, 1, 2.7, emphasizedDecel, popin 93%
    animation = layersOut, 1, 2.4, menu_accel, popin 94%

    # fade
    animation = fadeLayersIn, 1, 0.5, menu_decel
    animation = fadeLayersOut, 1, 2.7, stall

    # workspaces
    animation = workspaces, 1, 7, menu_decel, slide
    # specialWorkspace
    animation = specialWorkspaceIn, 1, 2.8, emphasizedDecel, slidevert
    animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    animate_manual_resizes = true
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    vfr = 1
    vrr = 1
    session_lock_xray = true
    initial_workspace_tracking = true
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = hu
    numlock_by_default = true
    follow_mouse = 1

    accel_profile = flat
    sensitivity = 0.25 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# General actions
bind = $mainMod, t, exec, $terminal
bind = $mainMod, q, killactive,
bind = $mainMod, e, exec, $fileManager
bind = $mainMod, f, togglefloating
bind = $mainMod, g, fullscreen,
bind = $mainMod, d, exec, $menu
bind = $mainMod, b, exec, $browser
bind = $mainMod, delete, exit,
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy

# Hyprshot
$satty = satty --filename - --copy-command wl-copy --early-exit --floating-hack --output-filename ~/Pictures/satty-$(date '+%Y%m%d-%H:%M:%S').png
bind = $mainMod SHIFT, F12, exec, hyprshot --mode region --raw | $satty
bind = $mainMod CTRL, F12, exec, hyprshot --mode window --raw | $satty
bind = $mainMod ALT, F12, exec, hyprshot --mode output --raw | $satty

bind = SHIFT, F12, exec, hyprshot --mode region 
bind = CTRL, F12, exec, hyprshot --mode window 
bind = ALT, F12, exec, hyprshot --mode output 

# Move focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# Move windows
bind = $mainMod CTRL, h, movewindow, l
bind = $mainMod CTRL, j, movewindow, d
bind = $mainMod CTRL, k, movewindow, u
bind = $mainMod CTRL, l, movewindow, r

# Resize windows
bind = $mainMod SHIFT, h, resizeactive, -160 0
bind = $mainMod SHIFT, j, resizeactive, 0 -80
bind = $mainMod SHIFT, k, resizeactive, 0 80
bind = $mainMod SHIFT, l, resizeactive, 160 0

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5
bind = $mainMod CTRL, 6, movetoworkspace, 6
bind = $mainMod CTRL, 7, movetoworkspace, 7
bind = $mainMod CTRL, 8, movetoworkspace, 8
bind = $mainMod CTRL, 9, movetoworkspace, 9
bind = $mainMod CTRL, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod CTRL, S, movetoworkspace, special:magic

# Move through workspaces with scrollwheel
bind = $mainMod ALT, mouse_down, workspace, r+1
bind = $mainMod ALT, mouse_up, workspace, r-1

# Move through workspaces with comma/period or x/c for two or single hand use
bind = $mainMod, period, workspace, r+1
bind = $mainMod, comma, workspace, r-1
bind = $mainMod CTRL, period, movetoworkspace, r+1
bind = $mainMod CTRL, comma, movetoworkspace, r-1

bind = $mainMod, X, workspace, r+1
bind = $mainMod, Y, workspace, r-1
bind = $mainMod CTRL, X, movetoworkspace, r+1
bind = $mainMod CTRL, Y, movetoworkspace, r-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Noctalia
bind = $mainMod, F5, exec, pkill qs; nohup qs -c noctalia-shell >/dev/null 2>&1 &

# Awakened POE Trade
bind = SHIFT, Space, pass, class:awakened-poe-trade
bind = CTRL ALT, D, pass, class:awakened-poe-trade

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Workspaces for DP-1
workspace = 1, monitor:DP-1, persistent:true
workspace = 2, monitor:DP-1, persistent:true
workspace = 3, monitor:DP-1, persistent:true
workspace = 4, monitor:DP-1, persistent:true
workspace = 5, monitor:DP-1, persistent:true
workspace = 6, monitor:DP-1, persistent:true
workspace = 7, monitor:DP-1, persistent:true
workspace = 8, monitor:DP-1, persistent:true

# Workspaces for DP-2
workspace = 9, monitor:DP-2, persistent:true
workspace = 10, monitor:DP-2, persistent:true
workspace = 11, monitor:DP-2, persistent:true
workspace = 12, monitor:DP-2, persistent:true

# Windowrules

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
  name = windowrule-1
  suppress_event = maximize
  match:class = .*
}


# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-2
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}


# Fix blur on electron context menus
windowrule {
  name = blur-fix
  no_blur = on
  match:class = ^()$
}


windowrule {
  name = tag-steam-settings
  tag = +steamSettings
  match:class = ^(steam)$
  match:title = ^(Steam Settings)$
}

windowrule {
  name = steam-settings
  float = on
  render_unfocused = on
  size = (monitor_w*0.5) (monitor_h*0.6)
  center = on
  match:tag = steamSettings
}

# steam games
windowrule = float on, fullscreen on, border_size 0, match:class (steam_app.*)

# Awakened PoE Trade
windowrule {
    name = apt
    match:class = awakened-poe-trade
    float = on
    no_blur = on
    no_shadow = on
    border_size = 0
}

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}
